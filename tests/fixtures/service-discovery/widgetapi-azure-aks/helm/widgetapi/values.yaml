# Base defaults. Overridden per environment by values-<env>.yaml.

nameOverride: ""
fullnameOverride: ""

image:
  repository: widgetcoacr.azurecr.io/widgetapi
  tag: ""          # chart appVersion is used when empty
  pullPolicy: IfNotPresent

serviceAccount:
  name: widgetapi
  # Workload Identity — annotation supplied per-env (client ID from platform Bicep).
  annotations: {}
  # Label that tells azure-workload-identity to inject the projected token.
  labels:
    azure.workload.identity/use: "true"

web:
  replicaCount: 2

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

worker:
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  # AGIC (Application Gateway Ingress Controller) class name.
  className: azure-application-gateway
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

env:
  LOG_LEVEL: info
  HTTP_PORT: "8080"

# CSI Secrets Store provider (azureKeyvaultSecretsProvider addon on AKS)
# is used to mount Key Vault secrets as files/env vars. The SecretProviderClass
# is created per-env and mounts the Postgres password + Datadog API key +
# PagerDuty routing key. The mounted files are then surfaced into the pod as
# env vars via a Kubernetes Secret synced by the CSI driver.
secretEnv:
  enabled: true
  secretName: widgetapi-kv-synced

datadog:
  enabled: true
  targetSystem: "linux"
  datadog:
    apiKeyExistingSecret: datadog-secret
    appKeyExistingSecret: datadog-secret
    clusterName: ""
    logs:
      enabled: true
      containerCollectAll: true
    apm:
      portEnabled: true
    processAgent:
      enabled: true

pagerduty:
  enabled: true
