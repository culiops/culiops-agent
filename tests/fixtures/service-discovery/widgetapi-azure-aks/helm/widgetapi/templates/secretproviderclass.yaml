{{- if .Values.secretEnv.enabled }}
# CSI Secrets Store provider (Azure Key Vault) — syncs secrets from the
# environment's Key Vault into a Kubernetes Secret that the pods envFrom.
# The syncing happens via the azureKeyvaultSecretsProvider addon on AKS.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-kv
  labels:
    app.kubernetes.io/name: widgetapi
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.secretEnv.secretName }}
      type: Opaque
      data:
        - objectName: pg-admin-password
          key: PG_PASSWORD
        - objectName: datadog-api-key
          key: DD_API_KEY
        - objectName: pagerduty-routing-key
          key: PAGERDUTY_ROUTING_KEY
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    # clientID of the Workload Identity UAMI (same as SA annotation).
    clientID: {{ index .Values.serviceAccount.annotations "azure.workload.identity/client-id" | quote }}
    keyvaultName: {{ printf "widgetapi-%s-kv" (regexReplaceAll "^.*service:widgetapi.*$" "" "") | default "widgetapi-prod-kv" | quote }}
    tenantId: {{ index .Values.serviceAccount.annotations "azure.workload.identity/tenant-id" | quote }}
    objects: |
      array:
        - |
          objectName: pg-admin-password
          objectType: secret
        - |
          objectName: datadog-api-key
          objectType: secret
        - |
          objectName: pagerduty-routing-key
          objectType: secret
{{- end }}
