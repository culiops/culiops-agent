# Base defaults — overridden per environment via values-{env}.yaml

replicaCount: 1

image:
  repository: registry.internal/notifyapi
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  logLevel: info
  maxRetries: 3
  queueUrl: ""
